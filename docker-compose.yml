services:
  # Qdrant — vector store (runs locally, data persists in a named volume)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # Chainlit app
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Override Qdrant URL to use the Docker service name, not localhost
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    volumes:
      # Mount docs dir so you can add PDFs without rebuilding the image
      - ./data:/app/data

volumes:
  qdrant_data:
